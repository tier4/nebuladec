# This file is automatically synced from:
# https://github.com/autowarefoundation/sync-file-templates
# To make changes, update the source repository and follow the guidelines in its README.

name: build-and-test-differential

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-differential:
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}
    permissions:
      contents: read
      actions: write # for invalidating the rosdep cache
    strategy:
      fail-fast: false
      matrix:
        rosdistro:
          - humble
          - jazzy
        include:
          - rosdistro: humble
            container: ros:humble
            build-depends-repos: build_depends.repos
          - rosdistro: jazzy
            container: ros:jazzy
            build-depends-repos: build_depends.repos
    steps:
      - name: Set PR fetch depth
        run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout PR branch and all PR commits
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}

      - name: Show disk space before the tasks
        run: df -h

      - name: Remove exec_depend
        uses: autowarefoundation/autoware-github-actions/remove-exec-depend@v1

      - name: Get modified packages
        id: get-modified-packages
        uses: autowarefoundation/autoware-github-actions/get-modified-packages@v1

      - name: Register local rosdep overrides
        # See .rosdep/local.yaml: works around an upstream Nebula typo
        # (`<depend>nlohmann_json</depend>` in nebula_seyond_common) that
        # has no rosdep mapping.
        run: |
          set -e
          sudo cp .rosdep/local.yaml /etc/ros/rosdep/sources.list.d/00-nebuladec-overrides.yaml
          echo "yaml file:///etc/ros/rosdep/sources.list.d/00-nebuladec-overrides.yaml" \
            | sudo tee /etc/ros/rosdep/sources.list.d/00-nebuladec-overrides.list

      - name: Invalidate stale rosdep cache so the override yaml is reapplied
        # colcon-build@v1's hardcoded rosdep cache key
        # (`rosdep-${runner.arch}-${rosdistro}`) does not change when our
        # override is added, so a previously stored cache that was built
        # WITHOUT our override would otherwise be reused and skip
        # `rosdep update`. Delete that cache via API so the next restore
        # misses and forces a fresh `rosdep update` that reads our yaml.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          KEY="rosdep-${{ runner.arch }}-${{ matrix.rosdistro }}"
          echo "Attempting to delete cache key: $KEY"
          curl -fsS -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/caches?key=$KEY&ref=${{ github.ref }}"
          echo "(cache delete may have failed if no such key existed; that is OK)"

      - name: Build
        if: ${{ steps.get-modified-packages.outputs.modified-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: ${{ matrix.rosdistro }}
          target-packages: ${{ steps.get-modified-packages.outputs.modified-packages }}
          build-depends-repos: ${{ matrix.build-depends-repos }}
          cache-key-element: nebuladec-rosdep-override-v1

      - name: Test
        id: test
        if: ${{ steps.get-modified-packages.outputs.modified-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-test@v1
        with:
          rosdistro: ${{ matrix.rosdistro }}
          target-packages: ${{ steps.get-modified-packages.outputs.modified-packages }}
          build-depends-repos: ${{ matrix.build-depends-repos }}

      - name: Upload coverage to CodeCov
        if: ${{ steps.test.outputs.coverage-report-files != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: ${{ steps.test.outputs.coverage-report-files }}
          fail_ci_if_error: false
          verbose: true
          flags: differential

      - name: Show disk space after the tasks
        run: df -h
