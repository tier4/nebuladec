name: pre-commit

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - name: Install system tooling
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git gnupg python3-pip cppcheck
          # Node.js 20 is needed for prettier / markdownlint-cli hooks.
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs
          pip install pre-commit vcstool

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Rewrite SSH GitHub URLs to HTTPS for vcs import
        # build_depends.repos references tier4/nebula via git@github.com:
        # which would require SSH agent + key. The Nebula repo is public,
        # so transparently rewrite the URL to HTTPS for this container.
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install workspace dependencies
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ./setup.sh

      - name: Build (generates compile_commands.json for clang-tidy)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ./build.sh --build-type release

      - name: Run pre-commit
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          pre-commit run --all-files --show-diff-on-failure
