# This file is automatically synced from:
# https://github.com/autowarefoundation/sync-file-templates
# To make changes, update the source repository and follow the guidelines in its README.

# https://pre-commit.ci/#configuration
ci:
  autofix_commit_msg: "style(pre-commit): autofix"
  autoupdate_schedule: quarterly
  autoupdate_commit_msg: "ci(pre-commit): quarterly autoupdate"
  # cppcheck is a system tool not available in the pre-commit.ci runner.
  # It still runs locally and in our GitHub Actions pre-commit job; it is
  # only skipped on the hosted pre-commit.ci service.
  skip: [cppcheck]

# Vendored third-party sources (e.g. the tabulate single-header, the png++
# headers and the glibc compat shim under third_party/) are not part of our
# style budget: let them keep upstream formatting.
exclude: ^(src/nebuladec_cli/include/third_party/|third_party/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: check-xml
      - id: check-yaml
        args: [--unsafe]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [-c, .markdownlint.yaml, --fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: [--no-error-on-unmatched-pattern]
        types_or: [json, yaml, markdown, javascript, ts, css, html]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/autowarefoundation/autoware-guideline-check
    rev: 0.2.0
    hooks:
      - id: check-package-depends

  - repo: https://github.com/tier4/pre-commit-hooks-ros
    rev: v0.10.2
    hooks:
      - id: prettier-package-xml
      - id: ros-include-guard
      - id: sort-package-xml

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-w, -s, -i=4]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint
        args: [--quiet]
        exclude: .cu

  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck
        description: Run cppcheck on changed C/C++ sources using .cppcheck_suppressions.
        entry: cppcheck
        args:
          - --enable=all
          - --inconclusive
          - -DPLUGINLIB_EXPORT_CLASS(class_type,base_class)=
          - -Dslots=
          - -DQ_SLOTS=
          - --error-exitcode=1
          - --suppressions-list=.cppcheck_suppressions
          - --inline-suppr
        language: system
        types_or: [c++, c]
        require_serial: true

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--quiet, --config=.markdown-link-check.json]
