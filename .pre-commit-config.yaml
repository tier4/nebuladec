# This file is automatically synced from:
# https://github.com/autowarefoundation/sync-file-templates
# To make changes, update the source repository and follow the guidelines in its README.

# https://pre-commit.ci/#configuration
ci:
  autofix_commit_msg: "style(pre-commit): autofix"
  autoupdate_schedule: quarterly
  autoupdate_commit_msg: "ci(pre-commit): quarterly autoupdate"
  # cppcheck is a system tool not available in the pre-commit.ci runner,
  # and clang-tidy needs build/compile_commands.json which only exists
  # after `./build.sh` (run by our GitHub Actions pre-commit job before
  # pre-commit). Both hooks still run locally and in our pre-commit CI;
  # they are only skipped on the hosted pre-commit.ci service.
  skip: [cppcheck, clang-tidy]

# Vendored third-party headers (e.g. tabulate single-header) are not
# part of our style budget: let them keep upstream formatting.
exclude: ^src/nebuladec_cli/include/third_party/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [--unsafe]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [-c, .markdownlint.yaml, --fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: [--no-error-on-unmatched-pattern]
        types_or: [json, yaml, markdown, javascript, ts, css, html]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/autowarefoundation/autoware-guideline-check
    rev: 0.2.0
    hooks:
      - id: check-package-depends

  - repo: https://github.com/tier4/pre-commit-hooks-ros
    rev: v0.10.2
    hooks:
      - id: flake8-ros
      - id: prettier-xacro
      - id: prettier-launch-xml
      - id: prettier-package-xml
      - id: ros-include-guard
      - id: sort-package-xml

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-w, -s, -i=4]

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.1.0
    hooks:
      - id: black
        args: [--line-length=100]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint
        args: [--quiet]
        exclude: .cu

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.2
    hooks:
      - id: check-metaschema
        files: ^.+/schema/.*schema\.json$

  - repo: local
    hooks:
      - id: prettier-svg
        name: prettier svg
        description: Apply Prettier with plugin-xml to svg.
        entry: prettier --write --list-different --ignore-unknown --print-width 200 --xml-self-closing-space false --xml-whitespace-sensitivity ignore
        language: node
        files: .svg$
        additional_dependencies: [prettier@2.7.1, "@prettier/plugin-xml@2.2.0"]

      - id: cppcheck
        name: cppcheck
        description: Run cppcheck on changed C/C++ sources using .cppcheck_suppressions.
        entry: cppcheck
        args:
          - --enable=all
          - --inconclusive
          - -DPLUGINLIB_EXPORT_CLASS(class_type,base_class)=
          - -Dslots=
          - -DQ_SLOTS=
          - --error-exitcode=1
          - --suppressions-list=.cppcheck_suppressions
          - --inline-suppr
        language: system
        types_or: [c++, c]
        require_serial: true

      - id: clang-tidy
        name: clang-tidy
        description: Run clang-tidy against the .clang-tidy checks (needs build/compile_commands.json).
        entry: clang-tidy
        args: [-p=build, --quiet]
        language: python
        additional_dependencies: [clang-tidy==21.1.6]
        files: ^src/nebuladec_(adapters|bag|cli|core)/.*\.(c|cc|cpp|cxx)$
        require_serial: true

  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        exclude: .svg$

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--quiet, --config=.markdown-link-check.json]
