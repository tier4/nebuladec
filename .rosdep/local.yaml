# Local rosdep overrides for upstream package.xml typos.
#
# Why: nebula_seyond_common (pinned via build_depends.repos) declares
#   <depend>nlohmann_json</depend>
# which is not a valid rosdep key. The other Nebula packages correctly
# spell it `nlohmann-json-dev`. Until that upstream typo is fixed and we
# can move our pin forward, this file maps the broken key to the same
# Debian package the rest of Nebula resolves to.
nlohmann_json:
  ubuntu: [nlohmann-json3-dev]
  debian: [nlohmann-json3-dev]
